<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Enterprise Verification Gateway</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #121212; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }

        #scannerView { padding: 15px; flex-direction: column; flex: 1; display: flex; }
        header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        header h1 { font-size: 18px; color: #f39c12; }
        
        .config-card { background: #1e1e1e; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #333; }
        .select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .select-group label { display: block; color: #888; font-size: 11px; margin-bottom: 4px; text-transform: uppercase; }
        .select-group select { width: 100%; padding: 8px; background: #2b2b2b; border: 1px solid #444; color: #fff; border-radius: 4px; font-weight: bold; }

        /* Gate Display Panels */
        .display-panel {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #1a1a1a; border-radius: 8px; border: 2px dashed #444; padding: 30px; text-align: center;
            margin-bottom: 20px; min-height: 250px; transition: all 0.2s;
        }
        .status-title { font-size: 32px; font-weight: bold; }
        .status-desc { font-size: 15px; color: #ccc; max-width: 400px; line-height: 1.4; margin-top: 5px; }
        
        /* High-Visibility Industrial Output Overrides */
        .state-pass { background: #1b5e20 !important; border-color: #4caf50 !important; }
        .state-fail { background: #b71c1c !important; border-color: #f44336 !important; }

        .input-area { background: #1e1e1e; padding: 15px; border-radius: 6px; border: 1px solid #333; }
        .input-area input {
            width: 100%; padding: 14px; background: #2b2b2b; border: 1px solid #444;
            color: #fff; border-radius: 4px; font-size: 16px; text-align: center; font-weight: bold;
        }
        .input-area input:focus { border-color: #f39c12; outline: none; }
        
        .hint-text { font-size: 11px; color: #666; text-align: center; margin-top: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="scannerView">
        <header>
            <h1>ENTERPRISE WMS GATEWAY</h1>
        </header>

        <div class="config-card">
            <div class="select-grid">
                <div class="select-group">
                    <label>Target Rate Area</label>
                    <select id="manifestArea">
                        <option value="MEGHALAYA" selected>Meghalaya</option>
                        <option value="ASSAM">Assam</option>
                        <option value="WEST BENGAL">West Bengal</option>
                    </select>
                </div>
                <div class="select-group">
                    <label>Required Pack Size</label>
                    <select id="manifestSize">
                        <option value="180">180 ml</option>
                        <option value="375">375 ml</option>
                        <option value="750" selected>750 ml</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="display-panel" id="displayPanel">
            <div class="status-title" id="statusTitle">AWAITING SCANNER SCAN</div>
            <div class="status-desc" id="statusDesc">Ready for laser input entries. Scan the label's barcode or type the EAN numbers manually below.</div>
        </div>

        <div class="input-area">
            <input type="text" id="barcodeStreamInput" placeholder="[ READY FOR ENTERPRISE INPUT ]" autofocus autocomplete="off">
            <div class="hint-text">System dynamically catches inputs automatically. Keep focused.</div>
        </div>
    </div>

    <script>
        // --- MASTER SYSTEM COMPLIANCE REGISTRY ---
        const BARCODE_MASTER_DATA = {
            "8901522001099": { size: "375", area: "MEGHALAYA", name: "Royal Stag 375ml" },
            "8901522002096": { size: "180", area: "MEGHALAYA", name: "Royal Stag 180ml" },
            "8901522000092": { size: "750", area: "MEGHALAYA", name: "Royal Stag 750ml" }
        };

        const streamInput = document.getElementById('barcodeStreamInput');
        const displayPanel = document.getElementById('displayPanel');
        const statusTitle = document.getElementById('statusTitle');
        const statusDesc = document.getElementById('statusDesc');

        // Force browser cursor window focus loop continuously so input is never missed
        document.addEventListener('click', () => streamInput.focus());
        window.addEventListener('load', () => streamInput.focus());

        // Dynamic key listener captures fast scanner streams instantly
        streamInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                processHardwareInput(this.value.trim());
                this.value = ''; // Instantly wipe entry buffer for next sequential bottle run
            }
        });

        function processHardwareInput(barcode) {
            if (!barcode) return;

            const targetArea = document.getElementById('manifestArea').value;
            const targetSize = document.getElementById('manifestSize').value;
            const product = BARCODE_MASTER_DATA[barcode];

            displayPanel.className = "display-panel"; // Flush standard states

            if (product) {
                const isAreaValid = product.area === targetArea;
                const isSizeValid = product.size === targetSize;

                if (isAreaValid && isSizeValid) {
                    displayPanel.classList.add('state-pass');
                    statusTitle.innerText = "✓ AUTHENTIC PASS";
                    statusDesc.innerText = `${product.name} verified correctly for distribution zone [${product.area}].`;
                } else {
                    displayPanel.classList.add('state-fail');
                    statusTitle.innerText = "⚠ COMPLIANCE FAILURE";
                    
                    let discrepancies = [];
                    if (!isAreaValid) discrepancies.push(`Illegal Region Allocation (Reads ${product.area})`);
                    if (!isSizeValid) discrepancies.push(`Incorrect Container Size (Reads ${product.size}ml)`);
                    statusDesc.innerText = discrepancies.join(" | ");
                }
            } else {
                displayPanel.classList.add('state-fail');
                statusTitle.innerText = "⚠ UNREGISTERED SKU";
                statusDesc.innerText = `EAN identity matrix [${barcode}] does not exist inside active WMS master databases.`;
            }
        }
    </script>
</body>
</html>
