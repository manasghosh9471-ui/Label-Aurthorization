<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Threshold Verification Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #121212; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }

        #scannerView { padding: 15px; flex-direction: column; flex: 1; display: flex; }
        header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        header h1 { font-size: 18px; color: #f39c12; }
        
        .config-card { background: #1e1e1e; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #333; }
        .select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .select-group label { display: block; color: #888; font-size: 11px; margin-bottom: 4px; text-transform: uppercase; }
        .select-group select { width: 100%; padding: 8px; background: #2b2b2b; border: 1px solid #444; color: #fff; border-radius: 4px; font-weight: bold; }

        .display-panel {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #1a1a1a; border-radius: 8px; border: 2px dashed #444; padding: 30px; text-align: center;
            margin-bottom: 20px; min-height: 250px; transition: all 0.2s;
        }
        .status-title { font-size: 28px; font-weight: bold; }
        .status-desc { font-size: 15px; color: #ccc; max-width: 400px; line-height: 1.4; margin-top: 5px; }
        
        .state-pass { background: #1b5e20 !important; border-color: #4caf50 !important; }
        .state-fail { background: #b71c1c !important; border-color: #f44336 !important; }
        .state-processing { background: #2980b9 !important; border-color: #3498db !important; }

        .upload-area { background: #1e1e1e; padding: 20px; border-radius: 6px; text-align: center; border: 1px solid #333; margin-bottom: 15px;}
        .upload-btn { background: #f39c12; color: #111; font-weight: bold; padding: 16px 32px; border-radius: 4px; cursor: pointer; display: inline-block; font-size: 16px; text-transform: uppercase; width: 100%; max-width: 320px; }
        .upload-area input { display: none; }
        
        #hiddenCaptureImg { display: none; max-width: 100%; max-height: 150px; margin-top: 15px; border-radius: 4px; }
        .debug-box { background: #000; color: #0f0; font-family: monospace; padding: 10px; border-radius: 4px; font-size: 11px; max-height: 100px; overflow-y: auto; display: block; margin-top: 10px; }
        #thresholdCanvas { display: none; }
    </style>
</head>
<body>

    <div id="scannerView">
        <header>
            <h1>THRESHOLD PROCESSING PORTAL</h1>
        </header>

        <div class="config-card">
            <div class="select-grid">
                <div class="select-group">
                    <label>Target Rate Area</label>
                    <select id="manifestArea">
                        <option value="FOR SALE IN MEGHALAYA ONLY" selected>Meghalaya</option>
                        <option value="FOR SALE IN ASSAM ONLY">Assam</option>
                        <option value="FOR SALE IN WEST BENGAL ONLY">West Bengal</option>
                    </select>
                </div>
                <div class="select-group">
                    <label>Required Pack Size</label>
                    <select id="manifestSize">
                        <option value="180">180 ml</option>
                        <option value="375">375 ml</option>
                        <option value="750" selected>750 ml</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="display-panel" id="displayPanel">
            <div class="status-title" id="statusTitle">READY TO VERIFY</div>
            <div class="status-desc" id="statusDesc">Tap below to take a clear, flat photo of the bottle label details.</div>
        </div>

        <div class="upload-area">
            <label class="upload-btn">
                📷 Capture Label Image
                <input type="file" id="labelImageInput" accept="image/*" capture="environment">
            </label>
            <img id="hiddenCaptureImg" alt="Scan snapshot preview">
            <canvas id="thresholdCanvas"></canvas>
        </div>

        <div class="debug-box" id="debugBox">Awaiting capture input token stream...</div>
    </div>

    <script>
        const BARCODE_MASTER_DATA = {
            "8901522000092": { size: "750", area: "FOR SALE IN MEGHALAYA ONLY", label: "Royal Stag 750ml" },
            "8901522001099": { size: "375", area: "FOR SALE IN MEGHALAYA ONLY", label: "Royal Stag 375ml" },
            "8901522002096": { size: "180", area: "FOR SALE IN MEGHALAYA ONLY", label: "Royal Stag 180ml" }
        };

        const imageInput = document.getElementById('labelImageInput');
        const displayPanel = document.getElementById('displayPanel');
        const statusTitle = document.getElementById('statusTitle');
        const statusDesc = document.getElementById('statusDesc');
        const debugBox = document.getElementById('debugBox');
        const hiddenCaptureImg = document.getElementById('hiddenCaptureImg');
        const threshCanvas = document.getElementById('thresholdCanvas');

        imageInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    hiddenCaptureImg.src = e.target.result;
                    hiddenCaptureImg.style.display = "inline-block";
                    hiddenCaptureImg.onload = function() {
                        executeThresholdScan();
                    };
                }
                reader.readAsDataURL(this.files[0]);
            }
        });

        async function executeThresholdScan() {
            displayPanel.className = "display-panel state-processing";
            statusTitle.innerText = "CONTRASTING GRID...";
            statusDesc.innerText = "Applying dynamic black-and-white threshold filtering layers...";

            const targetArea = document.getElementById('manifestArea').value.toUpperCase();
            const targetSize = document.getElementById('manifestSize').value;

            let barcodeDetected = null;
            let textDetected = "";

            try {
                const ctx = threshCanvas.getContext('2d');
                threshCanvas.width = hiddenCaptureImg.naturalWidth;
                threshCanvas.height = hiddenCaptureImg.naturalHeight;
                ctx.drawImage(hiddenCaptureImg, 0, 0);

                // Apply High-Speed Grayscale & Contrast Threshold Layer Filtering
                const imgData = ctx.getImageData(0, 0, threshCanvas.width, threshCanvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const brightness = 0.34 * data[i] + 0.5 * data[i+1] + 0.16 * data[i+2];
                    const binarized = brightness > 125 ? 255 : 0; // Cut off shadows
                    data[i] = data[i+1] = data[i+2] = binarized;
                }
                ctx.putImageData(imgData, 0, 0);
                const standardProcessedBlob = threshCanvas.toDataURL('image/jpeg', 0.6);

                // --- DETECT BARCODE ---
                try {
                    const codeReader = new ZXing.BrowserMultiFormatReader();
                    const barcodeResult = await codeReader.decodeFromImageElement(hiddenCaptureImg);
                    barcodeDetected = barcodeResult.text.trim();
                } catch (bErr) { }

                // --- OCR ON ROTATION VIEWS ---
                const angles = [0, 90, 270];
                for (let angle of angles) {
                    if (angle !== 0) {
                        threshCanvas.width = hiddenCaptureImg.naturalHeight;
                        threshCanvas.height = hiddenCaptureImg.naturalWidth;
                        ctx.clearRect(0,0, threshCanvas.width, threshCanvas.height);
                        ctx.translate(threshCanvas.width/2, threshCanvas.height/2);
                        ctx.rotate(angle * Math.PI / 180);
                        ctx.drawImage(hiddenCaptureImg, -hiddenCaptureImg.naturalWidth/2, -hiddenCaptureImg.naturalHeight/2);
                        ctx.setTransform(1,0,0,1,0,0);
                    }
                    const frameUrl = threshCanvas.toDataURL('image/jpeg', 0.5);
                    const ocrResult = await Tesseract.recognize(frameUrl, 'eng');
                    textDetected += " " + ocrResult.data.text.toUpperCase();
                }

                const cleanText = textDetected.replace(/\s+/g, ' ');
                debugBox.innerText = `[BARCODE]: ${barcodeDetected || 'Missed'}\n[TEXT]: ${cleanText}`;
                displayPanel.className = "display-panel";

                let barcodeValid = false;
                if (barcodeDetected && BARCODE_MASTER_DATA[barcodeDetected]) {
                    const sku = BARCODE_MASTER_DATA[barcodeDetected];
                    if (sku.size === targetSize && sku.area === targetArea) barcodeValid = true;
                }

                const textValid = cleanText.includes(targetArea) && cleanText.includes(targetSize);

                if (barcodeValid || textValid) {
                    displayPanel.classList.add('state-pass');
                    statusTitle.innerText = "✓ GENUINE PASS";
                    statusDesc.innerText = `SKU verification target match successful.`;
                } else {
                    displayPanel.classList.add('state-fail');
                    statusTitle.innerText = "⚠ COMPLIANCE DISMATCH";
                    statusDesc.innerText = "Extracted label signatures do not match manifest allocations.";
                }

            } catch (err) {
                displayPanel.className = "display-panel state-fail";
                statusTitle.innerText = "PROCESSING ERROR";
                statusDesc.innerText = "Scan processing loop interrupted. Hold device completely still.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
