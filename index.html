<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS High-Speed Live Scanner</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #121212; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }

        #scannerView { padding: 15px; flex-direction: column; flex: 1; display: flex; }
        header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        header h1 { font-size: 18px; color: #f39c12; }
        
        .config-card { background: #1e1e1e; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #333; }
        .select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .select-group label { display: block; color: #888; font-size: 11px; margin-bottom: 4px; text-transform: uppercase; }
        .select-group select { width: 100%; padding: 8px; background: #2b2b2b; border: 1px solid #444; color: #fff; border-radius: 4px; font-weight: bold; }

        /* Live Camera Feed Container */
        .video-wrapper {
            position: relative; width: 100%; max-width: 500px; margin: 0 auto 15px auto;
            border-radius: 8px; overflow: hidden; border: 2px solid #444; background: #000;
            aspect-ratio: 4/3;
        }
        #videoStream { width: 100%; height: 100%; object-fit: cover; }

        /* Dynamic Real-Time Status Overlay Overlay */
        .live-overlay-shield {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px; pointer-events: none; transition: background 0.2s ease;
            background: rgba(0,0,0,0.1);
        }
        
        .status-title { font-size: 28px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }
        .status-desc { font-size: 14px; margin-top: 5px; text-shadow: 0 1px 3px rgba(0,0,0,0.9); color: #eee; }

        /* Fast Feedback Colors */
        .shield-pass { background: rgba(46, 204, 113, 0.85) !important; color: #fff !important; }
        .shield-fail { background: rgba(231, 76, 60, 0.85) !important; color: #fff !important; }

        .control-panel { text-align: center; margin-bottom: 10px; }
        .action-btn { background: #f39c12; color: #111; font-weight: bold; padding: 14px 28px; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 14px; width: 100%; max-width: 300px; }
        
        .result-box { background: #1e1e1e; border: 1px solid #333; padding: 12px; border-radius: 4px; font-family: monospace; font-size: 13px; text-align: center; color: #aaa; }
        .result-box span { color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

    <div id="scannerView">
        <header>
            <h1>HIGH-SPEED VERIFICATION GATE</h1>
        </header>

        <div class="config-card">
            <div class="select-grid">
                <div class="select-group">
                    <label>Target Rate Area</label>
                    <select id="manifestArea">
                        <option value="MEGHALAYA" selected>Meghalaya</option>
                        <option value="ASSAM">Assam</option>
                        <option value="WEST BENGAL">West Bengal</option>
                    </select>
                </div>
                <div class="select-group">
                    <label>Required Pack Size</label>
                    <select id="manifestSize">
                        <option value="180">180 ml</option>
                        <option value="375">375 ml</option>
                        <option value="750" selected>750 ml</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="video-wrapper">
            <video id="videoStream" autoplay playsinline muted></video>
            <div class="live-overlay-shield" id="overlayShield">
                <div class="status-title" id="statusTitle">SCANNER ACTIVE</div>
                <div class="status-desc" id="statusDesc">Point lens at label barcode for instant cross-match...</div>
            </div>
        </div>

        <div class="control-panel">
            <button class="action-btn" id="startEngineBtn" onclick="initiateSpeedScanner()">Activate Video Matrix</button>
        </div>

        <div class="result-box" id="resultLog">Last Scanned Barcode: <span>None</span></div>
    </div>

    <script>
        // --- MASTER DATA REGISTRY MAPS ---
        const BARCODE_MASTER_DATA = {
            "8901522001099": { size: "375", area: "MEGHALAYA", label: "Royal Stag 375ml" },
            "8901522002096": { size: "180", area: "MEGHALAYA", label: "Royal Stag 180ml" },
            "8901522000092": { size: "750", area: "MEGHALAYA", label: "Royal Stag 750ml" }
        };

        let codeReader = null;
        const video = document.getElementById('videoStream');
        const shield = document.getElementById('overlayShield');
        const statusTitle = document.getElementById('statusTitle');
        const statusDesc = document.getElementById('statusDesc');
        const resultLog = document.getElementById('resultLog');

        async function initiateSpeedScanner() {
            document.getElementById('startEngineBtn').style.display = 'none';
            codeReader = new ZXing.BrowserMultiFormatReader();
            
            try {
                const constraints = { video: { facingMode: { exact: "environment" } } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints).catch(() => {
                    return navigator.mediaDevices.getUserMedia({ video: true });
                });
                
                video.srcObject = stream;
                
                // Continuous hardware-accelerated decode stream
                codeReader.decodeFromVideoDevice(null, 'videoStream', (result, err) => {
                    if (result) {
                        evaluateBarcodeLive(result.text.trim());
                    }
                });
            } catch (err) {
                statusTitle.innerText = "ACCESS ERROR";
                statusDesc.innerText = "Check camera configurations in system layout preferences.";
                console.error(err);
            }
        }

        function evaluateBarcodeLive(barcode) {
            resultLog.innerHTML = `Last Scanned Barcode: <span>${barcode}</span>`;
            
            const targetArea = document.getElementById('manifestArea').value;
            const targetSize = document.getElementById('manifestSize').value;
            const product = BARCODE_MASTER_DATA[barcode];

            shield.className = "live-overlay-shield";

            if (product) {
                const matchesArea = product.area === targetArea;
                const matchesSize = product.size === targetSize;

                if (matchesArea && matchesSize) {
                    shield.classList.add('shield-pass');
                    statusTitle.innerText = "✓ PASS";
                    statusDesc.innerText = `${product.label} approved for ${product.area}`;
                } else {
                    shield.classList.add('shield-fail');
                    statusTitle.innerText = "⚠ MISMATCH";
                    
                    let errors = [];
                    if (!matchesArea) errors.push(`Wrong Region (${product.area})`);
                    if (!matchesSize) errors.push(`Wrong Size (${product.size}ml)`);
                    statusDesc.innerText = errors.join(" | ");
                }
            } else {
                shield.classList.add('shield-fail');
                statusTitle.innerText = "⚠ UNREGISTERED";
                statusDesc.innerText = `Barcode data missing from active database registries.`;
            }

            // Automatically clear tracking screen highlights back to normal after 1.5 seconds
            setTimeout(() => {
                if (shield.className !== "live-overlay-shield") {
                    shield.className = "live-overlay-shield";
                    statusTitle.innerText = "SCANNER ACTIVE";
                    statusDesc.innerText = "Point lens at label barcode for instant cross-match...";
                }
            }, 1500);
        }
    </script>
</body>
</html>
