<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Dual-Engine Verification Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #121212; color: #fff; min-height: 100vh; }

        /* --- STYLING: LOGIN VIEW --- */
        #loginView {
            display: flex; justify-content: center; align-items: center; height: 100vh;
            background-size: cover; background-position: center; position: relative; transition: background 1.5s ease-in-out;
        }
        #loginView::before {
            content: ''; position: absolute; top:0; left:0; right:0; bottom:0;
            background: linear-gradient(135deg, rgba(20,20,20,0.85) 0%, rgba(40,40,40,0.6) 100%); z-index: 1;
        }
        .login-container {
            position: relative; z-index: 2; background: rgba(30, 30, 30, 0.85); border: 1px solid #444;
            border-top: 4px solid #f39c12; padding: 40px; border-radius: 8px; width: 90%; max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        .wms-header { text-align: center; margin-bottom: 30px; }
        .wms-header h1 { color: #fff; font-size: 22px; letter-spacing: 1px; }
        .wms-header p { color: #f39c12; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-top: 5px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #aaa; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; background: #2b2b2b; border: 1px solid #444; color: #fff; border-radius: 4px; }
        .login-btn { width: 100%; padding: 14px; background: #f39c12; border: none; color: #111; font-weight: bold; font-size: 16px; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        /* --- STYLING: SCANNER VIEW --- */
        #scannerView { display: none; padding: 20px; flex-direction: column; min-height: 100vh; }
        header { border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        header h1 { font-size: 20px; color: #f39c12; }
        
        .config-card { background: #1e1e1e; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #333; }
        .config-card h3 { color: #aaa; font-size: 11px; text-transform: uppercase; margin-bottom: 10px; }
        .select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .select-group label { display: block; color: #888; font-size: 12px; margin-bottom: 5px; }
        .select-group select { width: 100%; padding: 10px; background: #2b2b2b; border: 1px solid #444; color: #fff; border-radius: 4px; font-weight: bold; }

        .display-panel {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #1a1a1a; border-radius: 8px; border: 2px dashed #444; padding: 30px; text-align: center;
            margin-bottom: 20px; min-height: 250px; transition: all 0.2s;
        }
        .status-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .status-desc { font-size: 15px; color: #ccc; max-width: 400px; line-height: 1.4; }
        
        .state-pass { background: #1b5e20 !important; border-color: #4caf50 !important; }
        .state-fail { background: #b71c1c !important; border-color: #f44336 !important; }
        .state-processing { background: #2980b9 !important; border-color: #3498db !important; }

        .upload-area { background: #1e1e1e; padding: 20px; border-radius: 6px; text-align: center; border: 1px solid #333; margin-bottom: 15px;}
        .upload-btn { background: #f39c12; color: #111; font-weight: bold; padding: 14px 28px; border-radius: 4px; cursor: pointer; display: inline-block; font-size: 16px; text-transform: uppercase; }
        .upload-area input { display: none; }
        
        /* Hidden image element used internally to feed data to the barcode engine */
        #hiddenScanImg { display: none; max-width: 100%; height: auto; margin-top: 10px; border-radius: 4px; }
        .debug-box { background: #000; color: #0f0; font-family: monospace; padding: 12px; border-radius: 4px; font-size: 11px; text-align: left; max-height: 150px; overflow-y: auto; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="loginView">
        <div class="login-container">
            <div class="wms-header">
                <h1>SUPPLY CHAIN PLATFORM</h1>
                <p>Dual Engine Verifier</p>
            </div>
            <div class="input-group"><label>Operator ID</label><input type="text" placeholder="Enter ID"></div>
            <div class="input-group"><label>Password</label><input type="password" placeholder="••••••••"></div>
            <button class="login-btn" onclick="handleLogin()">Secure Login</button>
        </div>
    </div>

    <div id="scannerView">
        <header>
            <h1>ALCO-BEV DUAL VERIFICATION ENGINE</h1>
        </header>

        <div class="config-card">
            <h3>Set Target Manifest for Current Batch</h3>
            <div class="select-grid">
                <div class="select-group">
                    <label>Target Rate Area</label>
                    <select id="manifestArea">
                        <option value="MEGHALAYA" selected>Meghalaya</option>
                        <option value="ASSAM">Assam</option>
                        <option value="WEST BENGAL">West Bengal</option>
                    </select>
                </div>
                <div class="select-group">
                    <label>Required Pack Size</label>
                    <select id="manifestSize">
                        <option value="180">180 ml</option>
                        <option value="375">375 ml</option>
                        <option value="750" selected>750 ml</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="display-panel" id="displayPanel">
            <div class="status-title" id="statusTitle">AWAITING CAPTURE</div>
            <div class="status-desc" id="statusDesc">Snap a clear photo showing the barcode and text label together...</div>
        </div>

        <div class="upload-area">
            <label class="upload-btn">
                📷 Capture Label Image
                <input type="file" id="labelImageInput" accept="image/*" capture="environment">
            </label>
            <img id="hiddenScanImg" alt="Scanned preview">
        </div>

        <div class="debug-box" id="debugBox"></div>
    </div>

    <script>
        // --- MASTER SYSTEM DATA LOOKUP ARRAYS ---
        const BARCODE_MASTER_DATA = {
            "8901522001099": { size: "375", area: "MEGHALAYA", name: "Royal Stag 375ml" },
            "8901522002096": { size: "180", area: "MEGHALAYA", name: "Royal Stag 180ml" },
            "8901522000092": { size: "750", area: "MEGHALAYA", name: "Royal Stag 750ml" }
        };

        // --- BACKGROUND GRAPHICS SWITCHER ---
        const images = [
            "https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=800&q=80",
            "https://images.unsplash.com/photo-1553413077-190dd305871c?auto=format&fit=crop&w=800&q=80"
        ];
        let bgIndex = 0;
        function rotateBg() {
            const lv = document.getElementById('loginView');
            if(lv) lv.style.backgroundImage = `url('${images[bgIndex]}')`;
            bgIndex = (bgIndex + 1) % images.length;
        }
        rotateBg(); setInterval(rotateBg, 5000);

        function handleLogin() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('scannerView').style.display = 'flex';
        }

        const imageInput = document.getElementById('labelImageInput');
        const displayPanel = document.getElementById('displayPanel');
        const statusTitle = document.getElementById('statusTitle');
        const statusDesc = document.getElementById('statusDesc');
        const debugBox = document.getElementById('debugBox');
        const hiddenImg = document.getElementById('hiddenScanImg');

        imageInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    hiddenImg.src = e.target.result;
                    hiddenImg.style.display = "block"; // Display thumbnail to help operator verify picture clarity
                    
                    // Trigger dual scanning process once the image file finishes loading locally
                    hiddenImg.onload = function() {
                        processDualScan();
                    };
                }
                reader.readAsDataURL(this.files[0]);
            }
        });

        async function processDualScan() {
            displayPanel.className = "display-panel state-processing";
            statusTitle.innerText = "RUNNING ANALYSIS...";
            statusDesc.innerText = "Decoding barcode patterns and checking text regulations simultaneously...";
            debugBox.style.display = "none";
            debugBox.innerText = "";

            const targetArea = document.getElementById('manifestArea').value;
            const targetSize = document.getElementById('manifestSize').value;

            let decodedBarcode = null;
            let extractedText = "";

            // --- STEP 1: DECODE BARCODE STRIPES ---
            try {
                const codeReader = new ZXing.BrowserBarcodeReader();
                const barcodeResult = await codeReader.decodeFromImageElement(hiddenImg);
                decodedBarcode = barcodeResult.text.trim();
                debugBox.innerText += `[BARCODE ENGINE]: Successfully read barcode -> ${decodedBarcode}\n`;
            } catch (err) {
                debugBox.innerText += `[BARCODE ENGINE]: Stripe decode failed (Label wrinkled or missing barcode element).\n`;
            }

            // --- STEP 2: PARSE TEXT LABELS (OCR) ---
            try {
                const ocrResult = await Tesseract.recognize(hiddenImg.src, 'eng');
                extractedText = ocrResult.data.text.toUpperCase();
                debugBox.innerText += `\n[TEXT ENGINE RAW OUTPUT]:\n${ocrResult.data.text}`;
            } catch (err) {
                debugBox.innerText += `\n[TEXT ENGINE]: Failed to read print characters.\n`;
            }

            debugBox.style.display = "block";
            displayPanel.className = "display-panel"; // Reset container color states

            // --- STEP 3: CROSS-REFERENCE CRITERIA CHECK ---
            let isBarcodeValid = false;
            let isTextValid = false;
            let finalErrorLog = [];

            // Barcode matching logic
            if (decodedBarcode && BARCODE_MASTER_DATA[decodedBarcode]) {
                const matchedProduct = BARCODE_MASTER_DATA[decodedBarcode];
                if (matchedProduct.size === targetSize && matchedProduct.area === targetArea) {
                    isBarcodeValid = true;
                } else {
                    finalErrorLog.push(`Barcode expects ${matchedProduct.name} for ${matchedProduct.area}`);
                }
            } else if (decodedBarcode) {
                finalErrorLog.push(`Barcode ${decodedBarcode} is not registered in WMS database`);
            } else {
                finalErrorLog.push("Barcode could not be optically decoded");
            }

            // Text text matching logic
            const hasTextArea = extractedText.includes(targetArea);
            const hasTextSize = extractedText.includes(targetSize);
            if (hasTextArea && hasTextSize) {
                isTextValid = true;
            } else {
                if (!hasTextArea) finalErrorLog.push(`Text missing area string "${targetArea}"`);
                if (!hasTextSize) finalErrorLog.push(`Text missing size footprint "${targetSize}"`);
            }

            // --- STEP 4: DECISION RESOLUTION ---
            // Pass if the barcode engine confirms it perfectly, OR if text engine validates it completely.
            if (isBarcodeValid || (decodedBarcode === null && isTextValid)) {
                displayPanel.classList.add('state-pass');
                statusTitle.innerText = "✓ VERIFIED PASS";
                statusDesc.innerText = `Matched Target Configurations: ${targetArea} | ${targetSize} ml successfully confirmed.`;
            } else {
                displayPanel.classList.add('state-fail');
                statusTitle.innerText = "⚠ COMPLIANCE MISMATCH";
                statusDesc.innerText = finalErrorLog.join(" | ");
            }
        }
    </script>
</body>
</html>
