<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS High-Speed Scanner</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #121212; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }

        #scannerView { padding: 15px; flex-direction: column; flex: 1; display: flex; }
        header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        header h1 { font-size: 18px; color: #f39c12; }
        
        .config-card { background: #1e1e1e; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #333; }
        .select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .select-group label { display: block; color: #888; font-size: 11px; margin-bottom: 4px; text-transform: uppercase; }
        .select-group select { width: 100%; padding: 8px; background: #2b2b2b; border: 1px solid #444; color: #fff; border-radius: 4px; font-weight: bold; }

        /* Scanning Visual Feedback Viewport */
        .display-panel {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #1a1a1a; border-radius: 8px; border: 2px dashed #444; padding: 30px; text-align: center;
            margin-bottom: 20px; min-height: 250px; transition: all 0.2s;
        }
        .status-title { font-size: 28px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .status-desc { font-size: 15px; color: #ccc; max-width: 400px; line-height: 1.4; margin-top: 5px; }
        
        /* High-Visibility Industrial Response States */
        .state-pass { background: #1b5e20 !important; border-color: #4caf50 !important; }
        .state-fail { background: #b71c1c !important; border-color: #f44336 !important; }
        .state-processing { background: #2980b9 !important; border-color: #3498db !important; }

        .upload-area { background: #1e1e1e; padding: 20px; border-radius: 6px; text-align: center; border: 1px solid #333; margin-bottom: 15px;}
        .upload-btn { background: #f39c12; color: #111; font-weight: bold; padding: 16px 32px; border-radius: 4px; cursor: pointer; display: inline-block; font-size: 16px; text-transform: uppercase; width: 100%; max-width: 320px; }
        .upload-area input { display: none; }
        
        #hiddenCaptureImg { display: none; max-width: 100%; max-height: 150px; margin-top: 15px; border-radius: 4px; border: 1px solid #444; }
        .result-log { background: #000; color: #aaa; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 13px; text-align: center; margin-top: 5px; }
        .result-log span { color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

    <div id="scannerView">
        <header>
            <h1>HIGH-SPEED DYNAMIC SCANNER</h1>
        </header>

        <div class="config-card">
            <div class="select-grid">
                <div class="select-group">
                    <label>Target Rate Area</label>
                    <select id="manifestArea">
                        <option value="MEGHALAYA" selected>Meghalaya</option>
                        <option value="ASSAM">Assam</option>
                        <option value="WEST BENGAL">West Bengal</option>
                    </select>
                </div>
                <div class="select-group">
                    <label>Required Pack Size</label>
                    <select id="manifestSize">
                        <option value="180">180 ml</option>
                        <option value="375">375 ml</option>
                        <option value="750" selected>750 ml</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="display-panel" id="displayPanel">
            <div class="status-title" id="statusTitle">READY TO VERIFY</div>
            <div class="status-desc" id="statusDesc">Tap the button below to point the camera directly at the barcode stripes.</div>
        </div>

        <div class="upload-area">
            <label class="upload-btn">
                📷 Open Camera & Scan Live
                <input type="file" id="labelImageInput" accept="image/*" capture="environment">
            </label>
            <img id="hiddenCaptureImg" alt="Last capture overview">
        </div>

        <div class="result-log" id="barcodeTrackerLog">Last Decoded Barcode: <span>None</span></div>
    </div>

    <script>
        // --- MASTER SYSTEM DATA REGISTRY MATRIX ---
        const BARCODE_MASTER_DATA = {
            "8901522001099": { size: "375", area: "MEGHALAYA", label: "Royal Stag 375ml" },
            "8901522002096": { size: "180", area: "MEGHALAYA", label: "Royal Stag 180ml" },
            "8901522000092": { size: "750", area: "MEGHALAYA", label: "Royal Stag 750ml" }
        };

        const imageInput = document.getElementById('labelImageInput');
        const displayPanel = document.getElementById('displayPanel');
        const statusTitle = document.getElementById('statusTitle');
        const statusDesc = document.getElementById('statusDesc');
        const barcodeTrackerLog = document.getElementById('barcodeTrackerLog');
        const hiddenCaptureImg = document.getElementById('hiddenCaptureImg');

        imageInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    hiddenCaptureImg.src = e.target.result;
                    hiddenCaptureImg.style.display = "inline-block";
                    
                    hiddenCaptureImg.onload = function() {
                        executeHighSpeedDecode();
                    };
                }
                reader.readAsDataURL(this.files[0]);
            }
        });

        async function executeHighSpeedDecode() {
            displayPanel.className = "display-panel state-processing";
            statusTitle.innerText = "DECODING STRIPES...";
            statusDesc.innerText = "Processing high-speed geometric barcode calculations...";

            const targetArea = document.getElementById('manifestArea').value;
            const targetSize = document.getElementById('manifestSize').value;

            try {
                // Initialize the optimized browser barcode matrix reader
                const codeReader = new ZXing.BrowserMultiFormatReader();
                const decodeResult = await codeReader.decodeFromImageElement(hiddenCaptureImg);
                const barcode = decodeResult.text.trim();

                barcodeTrackerLog.innerHTML = `Last Decoded Barcode: <span>${barcode}</span>`;
                displayPanel.className = "display-panel"; // Reset processing state

                const product = BARCODE_MASTER_DATA[barcode];

                if (product) {
                    const matchesArea = product.area === targetArea;
                    const matchesSize = product.size === targetSize;

                    if (matchesArea && matchesSize) {
                        displayPanel.classList.add('state-pass');
                        statusTitle.innerText = "✓ GENUINE PASS";
                        statusDesc.innerText = `${product.label} authorized for destination target [${product.area}].`;
                    } else {
                        displayPanel.classList.add('state-fail');
                        statusTitle.innerText = "⚠ COMPLIANCE MISMATCH";
                        
                        let errors = [];
                        if (!matchesArea) errors.push(`Wrong Rate Area (${product.area})`);
                        if (!matchesSize) errors.push(`Mismatched Container Volume (${product.size}ml)`);
                        statusDesc.innerText = errors.join(" | ");
                    }
                } else {
                    displayPanel.classList.add('state-fail');
                    statusTitle.innerText = "⚠ UNREGISTERED SKU";
                    statusDesc.innerText = `Barcode code [${barcode}] is missing from active database registries.`;
                }

            } catch (err) {
                displayPanel.className = "display-panel state-fail";
                statusTitle.innerText = "SCAN SCAN MISSED";
                statusDesc.innerText = "Could not decode clear barcode lines. Center the camera directly over the barcode stripes.";
                barcodeTrackerLog.innerHTML = `Last Decoded Barcode: <span>Decode Failed</span>`;
                console.error(err);
            }
        }
    </script>
</body>
</html>
